<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="shortcut icon"
      href="assets/images/favicon.png"
      type="image/x-icon"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />
    <title>Blog Preview Card</title>
  </head>
  <body>
    <div class="container">
      <main class="card">
        <img
          class="blog-image"
          src="assets/images/illustration-article.svg"
          alt="Illustration representing HTML and CSS basics article"
        />
        <div class="card-content">
          <span class="blog-tag">Learning</span>
          <p class="blog-date">Published 21 Dec 2023</p>
          <h1 class="blog-title">HTML & CSS foundations</h1>
          <p class="blog-text">
            These languages are the backbone of every website, defining
            structure, content, and presentation.
          </p>
        </div>
        <div class="author">
          <div class="author-image">
            <img
              src="assets/images/image-avatar.webp"
              alt="Portrait of Greg Hooper"
            />
          </div>
          <h2 class="author-name">Greg Hooper</h2>
        </div>
      </main>

      <footer>
        <p class="copyright">
          Challenge by
          <a
            class="footer-link"
            href="https://www.frontendmentor.io/"
            target="_blank"
            >Frontend Mentor</a
          >. Coded by
          <a class="footer-link" href="https://github.com/MariamMohamedSamir"
            >Mariam Samir</a
          >.
        </p>
      </footer>
    </div>
  </body>
</html>
